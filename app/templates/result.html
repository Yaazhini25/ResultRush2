<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - {{ name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Semester 4 Marksheet</h1>
        <h2>{{ name }} ({{ reg_no }})</h2>

        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Grade</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody>
                {% for sub, grade, marks in results %}
                <tr>
                    <td>{{ sub }}</td>
                    <td>{{ grade }}</td>
                    <td>{{ marks }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/" class="back-btn">← Back to Login</a>
    </div>
</body>
</html>
